<svg width="500" height="575" viewBox="0 0 500 575" xmlns="http://www.w3.org/2000/svg">
  <!-- Define colors -->
  <defs>
    <style>
      :root {
        --color-cream: #ECDDB2;
        --color-green: #608844;
        --color-gray: #696556;
        --color-gold: #E0B850;
        --color-orange: #EDAE60;
        --color-blue: #3F5C8F;
        --color-black: #101113;
        --color-dark-green: #38473E;
        --color-red: #D53D5C;
        --color-olive: #626B4F;
      }
    </style>
  </defs>

  <!-- Base Layer (z-index: 1) -->
  <g style="z-index: 1">
    <!-- Hexagon Shape -->
    <polygon points="250,10 480,150 480,425 250,565 20,425 20,150" fill="#3F5C8F" stroke="#101113" stroke-width="10"/>
  </g>

  <!-- Ears Layer (z-index: 2) -->
  <g style="z-index: 2">
    <!-- Ears -->
    <circle cx="140" cy="200" r="46" fill="var(--color-dark-green)" stroke="var(--color-black)" stroke-width="4"/>
    <circle cx="360" cy="200" r="46" fill="var(--color-dark-green)" stroke="var(--color-black)" stroke-width="4"/>
    <circle cx="140" cy="200" r="32" fill="var(--color-olive)"/>
    <circle cx="360" cy="200" r="32" fill="var(--color-olive)"/>
  </g>

  <!-- Face Base Layer (z-index: 3) -->
  <g style="z-index: 3">
    <!-- Monkey face base - main fur area -->
    <path d="
      M250,110 
      C310,110 350,150 360,200
      C370,250 370,280 350,320
      C330,360 290,380 250,380
      C210,380 170,360 150,320
      C130,280 130,250 140,200
      C150,150 190,110 250,110
      Z" 
      fill="var(--color-dark-green)" 
      stroke="var(--color-black)" 
      stroke-width="5"/>
    <!-- Distinctive facial skin area (less fur) -->
    <path d="
      M250,210
      C290,210 310,230 320,260
      C330,290 330,320 320,340
      C300,370 270,380 250,380
      C230,380 200,370 180,340
      C170,320 170,290 180,260
      C190,230 210,210 250,210
      Z"
      fill="var(--color-olive)"/>

  </g>

  <!-- Facial Features Layer (z-index: 4) -->
  <g style="z-index: 4">
    <!-- Eyes -->
    <g class="eyes">
      <circle cx="220" cy="190" r="14" fill="var(--color-cream)"/>
      <circle cx="280" cy="190" r="14" fill="var(--color-cream)"/>
      <circle cx="220" cy="190" r="10" fill="var(--color-black)"/>
      <circle cx="280" cy="190" r="10" fill="var(--color-black)"/>
      <circle cx="222" cy="188" r="4" fill="var(--color-cream)"/>
      <circle cx="282" cy="188" r="4" fill="var(--color-cream)"/>
    </g>

    <!-- Nose -->
    <path d="M240,230 Q250,240 260,230 Q250,250 240,230" fill="var(--color-black)"/>

    <!-- Mouth -->
    <path d="
      M220,320
      C230,340 270,340 280,320
      L280,340
      C270,360 230,360 220,340
      Z" 
      fill="var(--color-cream)" 
      stroke="var(--color-gray)" 
      stroke-width="2"/>
  </g>

  <!-- Text Layer (z-index: 5) -->
  <g style="z-index: 5">
    <!-- HAPR Text -->
    <text x="140" y="460" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="var(--color-cream)">HAP</text>
    <text x="310" y="460" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="var(--color-gold)">R</text>
  </g>
</svg>
